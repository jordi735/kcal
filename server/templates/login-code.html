<!doctype html>
<html>
  <body style="margin:0;padding:32px;background:#1d2021;color:#fbf1c7;font-family:-apple-system,Segoe UI,sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:480px;margin:0 auto;">
      <tr>
        <td style="padding:0 0 24px;font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:28px;letter-spacing:-0.03em;color:#fbf1c7;">
          kcal.
        </td>
      </tr>
      <tr>
        <td style="padding:0 0 24px;font-size:15px;line-height:1.55;color:#d5c4a1;">
          Enter this code in the app to sign in. It expires in {{expiryMinutes}} minutes.
        </td>
      </tr>
      <tr>
        <td align="center" style="padding:8px 0 28px;">
          <div style="display:inline-block;padding:20px 28px;background:#282828;border:1px solid #3c3836;border-radius:16px;font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;font-size:36px;letter-spacing:0.2em;color:#ebdbb2;font-weight:600;">
            {{code}}
          </div>
        </td>
      </tr>
      <tr>
        <td style="padding:20px 0 0;border-top:1px solid #3c3836;font-size:11px;color:#665c54;letter-spacing:0.1em;text-transform:uppercase;font-family:'JetBrains Mono',ui-monospace,Menlo,monospace;">
          Didn't ask for this? Ignore this email.
        </td>
      </tr>
    </table>
  </body>
</html>
